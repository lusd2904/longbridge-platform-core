x-backend-env: &backend-env
  DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
  DB_READ_HOST: ${DOCKER_DB_READ_HOST:-host.docker.internal}
  REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
  SKSHARE_BASE_URL: ${DOCKER_SKSHARE_BASE_URL:-http://host.docker.internal:18081}
  REF_SKSHARE_BASE_URL: ${DOCKER_SKSHARE_BASE_URL:-http://host.docker.internal:18081}
  LONGBRIDGE_AI_PROVIDER: ${LONGBRIDGE_AI_PROVIDER:-gemini}
  LONGBRIDGE_AI_FALLBACK_PROVIDER: ${LONGBRIDGE_AI_FALLBACK_PROVIDER:-openai}
  LONGBRIDGE_AI_BASE_URL: ${LONGBRIDGE_AI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
  LONGBRIDGE_AI_URL: ${LONGBRIDGE_AI_URL:-https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
  LONGBRIDGE_AI_API_STYLE: ${LONGBRIDGE_AI_API_STYLE:-openai-chat-completions}
  LONGBRIDGE_AI_API_KEY: ${LONGBRIDGE_AI_API_KEY:-}
  LONGBRIDGE_AI_MODEL: ${LONGBRIDGE_AI_MODEL:-gemini-1.5-pro}
  LONGBRIDGE_AI_MODEL_SCAN_PULSE: ${LONGBRIDGE_AI_MODEL_SCAN_PULSE:-gemini-1.5-flash}
  LONGBRIDGE_AI_MODEL_SCAN_FAST: ${LONGBRIDGE_AI_MODEL_SCAN_FAST:-gemini-1.5-flash}
  LONGBRIDGE_AI_MODEL_SCAN_RISK: ${LONGBRIDGE_AI_MODEL_SCAN_RISK:-gemini-1.5-flash}
  LONGBRIDGE_AI_MODEL_SCAN_FINAL: ${LONGBRIDGE_AI_MODEL_SCAN_FINAL:-gemini-1.5-pro}
  LONGBRIDGE_AI_MODEL_TREND_BATCH: ${LONGBRIDGE_AI_MODEL_TREND_BATCH:-gemini-1.5-flash}
  LONGBRIDGE_AI_MODEL_RECOMMEND_BRIEF: ${LONGBRIDGE_AI_MODEL_RECOMMEND_BRIEF:-gemini-1.5-flash}
  LONGBRIDGE_AI_MODEL_RECOMMEND_SUMMARY: ${LONGBRIDGE_AI_MODEL_RECOMMEND_SUMMARY:-gemini-1.5-pro}
  LONGBRIDGE_AI_MODEL_VISION: ${LONGBRIDGE_AI_MODEL_VISION:-gemini-1.5-pro}
  LONGBRIDGE_AI_REASONING_EFFORT: ${LONGBRIDGE_AI_REASONING_EFFORT:-medium}
  LONGBRIDGE_AI_SCAN_REASONING_EFFORT: ${LONGBRIDGE_AI_SCAN_REASONING_EFFORT:-high}
  LONGBRIDGE_AI_TIMEOUT: ${LONGBRIDGE_AI_TIMEOUT:-8}
  LONGBRIDGE_RUNTIME: cli
  LONGBRIDGE_CLI_BIN: longbridge
  LONGBRIDGE_CLI_PUSH_POLLING_ENABLED: ${LONGBRIDGE_CLI_PUSH_POLLING_ENABLED:-false}
  LONGBRIDGE_REGION: cn
  LONGPORT_REGION: cn
  REF_AGNO_SIDECAR_URL: ${REF_AGNO_SIDECAR_URL:-http://agno-sidecar:3200}
  REF_ANALYSIS_SYNC_POSITIONS_LIMIT: ${REF_ANALYSIS_SYNC_POSITIONS_LIMIT:-12}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-backend-service: &backend-service
  image: refactor-v2-platform:local
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *backend-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging: *default-logging
  networks:
    - refactor-v2
    - sub2api-network

x-longbridge-cli-volumes: &longbridge-cli-volumes
  - ${HOME}/.longbridge/config.json:/root/.longbridge/config.json:ro
  - ${HOME}/.longbridge/openapi:/root/.longbridge/openapi:ro

services:
  redis:
    image: ${DOCKER_REDIS_IMAGE:-redis:8-alpine}
    container_name: refactor-v2-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    mem_limit: 256m
    cpus: 0.25
    networks:
      - refactor-v2
    volumes:
      - redis-data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  user-center:
    <<: *backend-service
    build:
      context: .
    container_name: refactor-v2-user
    command: ["scripts/docker_service_entrypoint.sh", "apps/platform/user-center/src"]
    mem_limit: 256m
    cpus: 0.25
    environment:
      <<: *backend-env
      SERVICE_PORT: "8101"
      REF_USER_CENTER_PORT: "8101"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8101/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  market-service:
    <<: *backend-service
    container_name: refactor-v2-market
    command: ["scripts/docker_service_entrypoint.sh", "apps/market/market-service/src"]
    volumes: *longbridge-cli-volumes
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      redis:
        condition: service_healthy
      user-center:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8102"
      REF_MARKET_SERVICE_PORT: "8102"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8102/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  analysis-service:
    <<: *backend-service
    container_name: refactor-v2-analysis
    command: ["scripts/docker_service_entrypoint.sh", "apps/intelligence/analysis-service/src"]
    mem_limit: 1024m
    cpus: 1.0
    depends_on:
      redis:
        condition: service_healthy
      market-service:
        condition: service_healthy
      agno-sidecar:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8103"
      REF_ANALYSIS_SERVICE_PORT: "8103"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8103/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  agno-sidecar:
    <<: *backend-service
    container_name: refactor-v2-agno-sidecar
    command: ["scripts/docker_service_entrypoint.sh", "apps/intelligence/agno-sidecar/src"]
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "3200"
      REF_AGNO_SIDECAR_PORT: "3200"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  strategy-service:
    <<: *backend-service
    container_name: refactor-v2-strategy
    command: ["scripts/docker_service_entrypoint.sh", "apps/intelligence/strategy-service/src"]
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      redis:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8104"
      REF_STRATEGY_SERVICE_PORT: "8104"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8104/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  trade-service:
    <<: *backend-service
    container_name: refactor-v2-trade
    command: ["scripts/docker_service_entrypoint.sh", "apps/trading/trade-service/src"]
    volumes: *longbridge-cli-volumes
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      redis:
        condition: service_healthy
      user-center:
        condition: service_healthy
      market-service:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8105"
      REF_TRADE_SERVICE_PORT: "8105"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8105/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  sentiment-service:
    <<: *backend-service
    container_name: refactor-v2-sentiment
    command: ["scripts/docker_service_entrypoint.sh", "apps/market/sentiment-service/src"]
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8106"
      REF_SENTIMENT_SERVICE_PORT: "8106"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8106/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  scheduler-service:
    <<: *backend-service
    container_name: refactor-v2-scheduler
    command: ["scripts/docker_service_entrypoint.sh", "apps/operations/scheduler-service/src"]
    volumes: *longbridge-cli-volumes
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      redis:
        condition: service_healthy
      user-center:
        condition: service_healthy
      market-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8107"
      REF_SCHEDULER_SERVICE_PORT: "8107"
      REF_ANALYSIS_SERVICE_URL: http://analysis-service:8103
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8107/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  risk-service:
    <<: *backend-service
    container_name: refactor-v2-risk
    command: ["scripts/docker_service_entrypoint.sh", "apps/governance/risk-service/src"]
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      redis:
        condition: service_healthy
      user-center:
        condition: service_healthy
      trade-service:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "8108"
      REF_RISK_SERVICE_PORT: "8108"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8108/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    <<: *backend-service
    container_name: refactor-v2-gateway
    command: ["scripts/docker_service_entrypoint.sh", "apps/platform/api-gateway/src"]
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      redis:
        condition: service_healthy
      user-center:
        condition: service_healthy
      market-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
      strategy-service:
        condition: service_healthy
      trade-service:
        condition: service_healthy
      sentiment-service:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
      risk-service:
        condition: service_healthy
      agno-sidecar:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_PORT: "5101"
      REF_GATEWAY_PORT: "5101"
      REF_USER_CENTER_URL: http://user-center:8101
      REF_MARKET_SERVICE_URL: http://market-service:8102
      REF_ANALYSIS_SERVICE_URL: http://analysis-service:8103
      REF_STRATEGY_SERVICE_URL: http://strategy-service:8104
      REF_TRADE_SERVICE_URL: http://trade-service:8105
      REF_SENTIMENT_SERVICE_URL: http://sentiment-service:8106
      REF_SCHEDULER_SERVICE_URL: http://scheduler-service:8107
      REF_RISK_SERVICE_URL: http://risk-service:8108
    ports:
      - "127.0.0.1:${REF_GATEWAY_PORT:-5101}:5101"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web-portal:
    build:
      context: .
      dockerfile: apps/frontend/web-portal/Dockerfile
    image: refactor-v2-web-portal:local
    container_name: refactor-v2-web
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    cpus: 0.1
    depends_on:
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user-center:
        condition: service_healthy
      market-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
      strategy-service:
        condition: service_healthy
      trade-service:
        condition: service_healthy
      sentiment-service:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
      risk-service:
        condition: service_healthy
    ports:
      - "${REF_WEB_PORTAL_PORT:-3100}:3100"
    networks:
      - refactor-v2
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: refactor-v2-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - refactor-v2

  grafana:
    image: grafana/grafana:latest
    container_name: refactor-v2-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - refactor-v2

networks:
  refactor-v2:
    name: refactor-v2
  sub2api-network:
    external: true
    name: deploy_sub2api-network

volumes:
  redis-data:
