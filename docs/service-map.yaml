project: refactor-v2
legacy_root: /Users/lusd/Documents/New project/LongbridgeTrade
principles:
  - keep_legacy_as_backup
  - migrate_by_domain
  - use_parallel_ports
  - keep_sentiment_read_model_isolated

services:
  - code: web-portal
    port: 3100
    status: live
    responsibility:
      - unified user interface
      - route orchestration
      - charts and analysis views
    legacy_sources:
      - web/src

  - code: api-gateway
    port: 5101
    status: live
    responsibility:
      - service catalog
      - dependency probes
      - observability summary
    legacy_sources:
      - backend-server/app.py
      - backend-server/src/api
      - services/api-gateway

  - code: user-center
    port: 8101
    status: live
    responsibility:
      - login
      - profile
      - user preferences
    legacy_sources:
      - backend-server/src/api/user_routes.py
      - backend-server/src/core/platform/PlatformAccessService.py

  - code: market-service
    port: 8102
    status: live
    responsibility:
      - market universe
      - price history
      - indicator snapshots
      - market scan datasets
      - stock pool and watchlist
    legacy_sources:
      - backend-server/src/core/analysis/HistoricalMarketDataService.py
      - backend-server/src/core/analysis/IndicatorSnapshotService.py
      - services/data-service/src/main.py

  - code: analysis-service
    port: 8103
    status: live
    responsibility:
      - ai analysis
      - trend batch scans
      - conclusion generation
      - quant factor inputs for strategy scoring
    legacy_sources:
      - backend-server/src/api/ai_routes.py
      - backend-server/src/core/analysis/DailySymbolTrendScanService.py
      - services/ai-service/src/main.py

  - code: strategy-service
    port: 8104
    status: live
    responsibility:
      - strategy config
      - risk rule coordination
      - backtest orchestration
      - self-watchlist quant strategy scan
      - lightweight position budget suggestions
    legacy_sources:
      - backend-server/src/strategy
      - web/src/views/Strategy.vue
      - web/src/views/Backtest.vue

  - code: trade-service
    port: 8105
    status: live
    responsibility:
      - order execution
      - normalized order state projection
      - position query
      - order projection
    legacy_sources:
      - legacy_trade_service/main.py

  - code: sentiment-service
    port: 8106
    status: live
    responsibility:
      - sentiment read model
      - GitHub reference project metadata
      - read-only quantitative sentiment fields
      - symbol sentiment summary
    legacy_sources:
      - AI_ANALYSIS_DESIGN.md

  - code: agno-sidecar
    port: 3200
    status: live
    responsibility:
      - Agno-compatible watchlist review
      - read-only AI gateway calls
      - degraded review fallback
    legacy_sources:
      - apps/intelligence/agno-sidecar/src/main.py

  - code: scheduler-service
    port: 8107
    status: live
    responsibility:
      - daily jobs
      - async workflow orchestration
      - recovery and replay
    legacy_sources:
      - backend-server/src/core/analysis
      - scripts/backend

  - code: risk-service
    port: 8108
    status: live
    responsibility:
      - risk overview
      - protection order management
      - notification center
      - user risk limits
    legacy_sources:
      - backend-server/src/api/data_routes.py
      - web/src/views/RiskManagement.vue
      - web/src/views/Notifications.vue

service_edges:
  - from: web-portal
    to: api-gateway
    kind: frontend_proxy
    path: /svc/gateway
    purpose: service catalog and observability status wall
  - from: web-portal
    to: user-center
    kind: frontend_proxy
    path: /svc/user
    purpose: login, bootstrap, menus and user settings
  - from: web-portal
    to: market-service
    kind: frontend_proxy
    path: /svc/market
    purpose: market data, watchlist and stock pool pages
  - from: web-portal
    to: analysis-service
    kind: frontend_proxy
    path: /svc/analysis
    purpose: AI analysis, recommendations and Agent run detail
  - from: web-portal
    to: strategy-service
    kind: frontend_proxy
    path: /svc/strategy
    purpose: strategy configuration, backtest pages and self-watchlist quant scan
  - from: web-portal
    to: trade-service
    kind: frontend_proxy
    path: /svc/trade
    purpose: accounts, positions, orders and execution UI
  - from: web-portal
    to: sentiment-service
    kind: frontend_proxy
    path: /svc/sentiment
    purpose: sentiment center read model
  - from: web-portal
    to: scheduler-service
    kind: frontend_proxy
    path: /svc/scheduler
    purpose: scheduler runtime and task center
  - from: web-portal
    to: risk-service
    kind: frontend_proxy
    path: /svc/risk
    purpose: risk overview, protection orders and notifications

  - from: api-gateway
    to: user-center
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: market-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: analysis-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: strategy-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: trade-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: sentiment-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: scheduler-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: risk-service
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability
  - from: api-gateway
    to: agno-sidecar
    kind: health_probe
    path: /health
    purpose: service catalog and dependency observability

  - from: scheduler-service
    to: analysis-service
    kind: service_call
    path: /api/v1/analysis/agent/watchlist-review
    purpose: scheduled watchlist pre-open and post-close review
  - from: analysis-service
    to: agno-sidecar
    kind: service_call
    path: /api/v1/agent/watchlist-review
    purpose: review-only AI watchlist analysis
  - from: agno-sidecar
    to: ai-gateway
    kind: external_call
    path: /v1/chat/completions
    purpose: OpenAI-compatible review generation through existing AI config
  - from: trade-service
    to: longbridge-cli
    kind: external_call
    purpose: broker account, quote and order execution runtime
  - from: market-service
    to: skshare
    kind: external_call
    purpose: market history fallback
  - from: market-service
    to: longbridge-quote
    kind: external_call
    purpose: quote and push data runtime
  - from: scheduler-service
    to: longbridge-quote
    kind: external_call
    purpose: scheduled symbol content cache refresh
