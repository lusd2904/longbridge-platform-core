[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "C90", # mccabe
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by formatter)
    "F403", # 'from module import *' used; unable to detect undefined names
    "F405", # name may be undefined, or defined from star imports
]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --cov=backend-server/src --cov=apps --cov-report=term-missing"
testpaths = [
    "tests",
]
pythonpath = [
    ".",
]
