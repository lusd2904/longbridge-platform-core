server {
    listen 3100;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Transfer + IO tuning ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # --- Compression (big transfer win for the SPA bundle) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # --- Baseline security headers (inherited by the /svc/* proxy routes,
    #     which define no add_header of their own) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    set $user_center_upstream http://user-center:8101;
    set $market_service_upstream http://market-service:8102;
    set $analysis_service_upstream http://analysis-service:8103;
    set $strategy_service_upstream http://strategy-service:8104;
    set $trade_service_upstream http://trade-service:8105;
    set $sentiment_service_upstream http://sentiment-service:8106;
    set $scheduler_service_upstream http://scheduler-service:8107;
    set $risk_service_upstream http://risk-service:8108;
    set $gateway_upstream http://api-gateway:5101;

    # Content-hashed Vite assets: safe to cache forever. Must come before
    # `location /` so it wins the prefix match for the immutable cache policy.
    # (add_header replaces inherited headers, so the security headers are repeated.)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # The SPA shell must never be cached, or clients keep loading stale
        # asset references after a deploy.
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /svc/user/ {
        rewrite ^/svc/user/(.*)$ /$1 break;
        proxy_pass $user_center_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/market/ {
        rewrite ^/svc/market/(.*)$ /$1 break;
        proxy_pass $market_service_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep long-lived market push WebSockets alive (nginx default is 60s).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /svc/analysis/ {
        rewrite ^/svc/analysis/(.*)$ /$1 break;
        proxy_pass $analysis_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/strategy/ {
        rewrite ^/svc/strategy/(.*)$ /$1 break;
        proxy_pass $strategy_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/trade/ {
        rewrite ^/svc/trade/(.*)$ /$1 break;
        proxy_pass $trade_service_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep long-lived trade push WebSockets alive (nginx default is 60s).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /svc/sentiment/ {
        rewrite ^/svc/sentiment/(.*)$ /$1 break;
        proxy_pass $sentiment_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/scheduler/ {
        rewrite ^/svc/scheduler/(.*)$ /$1 break;
        proxy_pass $scheduler_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/risk/ {
        rewrite ^/svc/risk/(.*)$ /$1 break;
        proxy_pass $risk_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /svc/gateway/ {
        rewrite ^/svc/gateway/(.*)$ /$1 break;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
